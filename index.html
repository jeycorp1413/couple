<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>정용 ♥ 지영 — 우리 캘린더</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#e26d92">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="우리 캘린더">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --pink:#f6a5c0; --pink-deep:#e26d92; --blue:#8fb8e8; --blue-deep:#5b8fd6;
    --both:#b48ad6; --bg:#fff7fb; --card:#ffffff; --line:#f1dee8;
    --ink:#5b4a52; --muted:#a892a0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:linear-gradient(160deg,#fff7fb 0%,#f3f7ff 100%); color:var(--ink); min-height:100vh;
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:480px; margin:0 auto;
    padding:calc(16px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) calc(40px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));}

  /* header */
  .top{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:6px;}
  .top h1{margin:0; font-size:21px; font-weight:800; letter-spacing:-.3px;}
  .top h1 .h{color:var(--pink-deep);} .top h1 .y{color:var(--blue-deep);}
  .gear{border:1.5px solid var(--line); background:#fff; border-radius:50%; width:40px; height:40px; cursor:pointer; font-size:17px; flex:none;}
  .live{font-size:11.5px; color:var(--muted); margin-bottom:14px;}
  .live.on{color:#4caf86;}

  /* dday hero */
  .hero{background:linear-gradient(135deg,#ffe3ee 0%,#e3edff 100%); border-radius:26px; padding:30px 22px; text-align:center; margin-bottom:18px; box-shadow:0 10px 34px rgba(226,109,146,.16);}
  .hero .lbl{font-size:13.5px; color:#9a7e8c; font-weight:600; letter-spacing:.2px;}
  .hero .big{font-size:54px; font-weight:900; letter-spacing:-1.5px; margin:4px 0 4px; line-height:1.05; background:linear-gradient(90deg,var(--pink-deep),var(--blue-deep)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .hero .sub{font-size:12.5px; color:#a892a0;}

  /* milestone chips — 3칸 그리드로 D-day 박스와 폭 정렬 */
  .marks{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:18px;}
  .mark{background:#fff; border:1.5px solid var(--line); border-radius:14px; padding:11px 6px; text-align:center;}
  .mark .mt{font-size:12px; color:var(--muted);}
  .mark .md{font-size:17px; font-weight:800; color:var(--pink-deep); margin:3px 0;}
  .mark .ms{font-size:10.5px; color:#b6a3ae;}

  .card{background:var(--card); border-radius:22px; padding:19px; margin-bottom:20px; box-shadow:0 8px 28px rgba(150,120,140,.10);}
  .sec-title{font-weight:800; font-size:17px; margin:0 0 13px; letter-spacing:-.2px; display:flex; align-items:center; gap:7px;}
  .mini-add{margin-left:auto; border:1.5px solid var(--pink); background:#fff; color:var(--pink-deep); font:inherit; font-size:12.5px; font-weight:700; border-radius:999px; padding:5px 12px; cursor:pointer;}
  .anniv{display:flex; align-items:center; gap:10px; padding:10px 2px; border-bottom:1px solid #f6ecf2;}
  .anniv:last-child{border-bottom:0;}
  .anniv .al{flex:1; font-size:14.5px; font-weight:600;}
  .anniv .al small{font-weight:400; color:#b6a3ae; font-size:12px;}
  .anniv .ad{font-size:15px; font-weight:800; color:var(--pink-deep); white-space:nowrap;}
  .anniv .ax{border:0; background:none; color:#d6bcc8; cursor:pointer; font-size:14px;}
  .chkrow{display:flex !important; align-items:center; gap:8px; font-size:13.5px; color:#7a6670; margin-top:14px;}
  .chkrow input{width:18px; height:18px;}

  /* calendar */
  .cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .cal-head .mtitle{font-size:17px; font-weight:800;}
  .cal-nav{border:0; background:#f6e9f1; color:var(--pink-deep); width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:16px; font-weight:800;}
  .grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .gd{text-align:center; font-size:12px; font-weight:700; color:#bba7b3; padding:4px 0;}
  .gd.sun,.gd.sat{color:#e8607f;}
  .cell{min-height:64px; border-radius:11px; padding:5px 5px 4px; background:#fbf4f8; cursor:pointer; display:flex; flex-direction:column; gap:2px; overflow:hidden; border:1.5px solid transparent;}
  .cell.blank{background:transparent; cursor:default;}
  .cell.today{border-color:var(--pink); background:#fff;}
  .cell .dn{font-size:12.5px; font-weight:700; color:#9c8893;}
  .cell.today .dn{color:var(--pink-deep);}
  .cell .sun,.cell .sat{color:#e8607f;}
  .cell .dn.hol{color:#e8607f;}
  .holname{font-size:9px; color:#e8607f; font-weight:700; line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .ev{font-size:10.5px; line-height:1.25; color:#fff; border-radius:5px; padding:1px 4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .more{font-size:9.5px; color:#b6a3ae; padding-left:2px;}

  /* todo */
  .todo{display:flex; align-items:center; gap:10px; padding:9px 2px; border-bottom:1px solid #f6ecf2;}
  .todo:last-child{border-bottom:0;}
  .todo .chk{width:22px; height:22px; border-radius:7px; border:2px solid var(--pink); cursor:pointer; flex:none; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px;}
  .todo.done .chk{background:var(--pink); border-color:var(--pink);}
  .todo .tx{flex:1; font-size:14.5px;}
  .todo.done .tx{text-decoration:line-through; color:#c5b3bd;}
  .todo .del{border:0; background:none; color:#d6bcc8; cursor:pointer; font-size:15px;}

  /* memo */
  .memo{padding:9px 0; border-bottom:1px solid #f6ecf2;}
  .memo:last-child{border-bottom:0;}
  .memo .mw{font-weight:800; font-size:12.5px; margin-bottom:2px;}
  .memo .mtx{font-size:14px; color:#6a5a62;}
  .memo .mt{font-size:10.5px; color:#c2adb6; margin-top:3px;}

  /* who chips */
  .who{display:flex; gap:7px; align-items:center; margin:10px 0; flex-wrap:wrap;}
  .who .wl{font-size:12.5px; color:var(--muted); margin-right:2px;}
  .who button{border:1.5px solid var(--line); background:#fff; border-radius:999px; padding:6px 14px; font:inherit; font-size:13px; cursor:pointer; color:#8a6670;}
  .who button.on{color:#fff; font-weight:700; border-color:transparent;}

  /* input row */
  .irow{display:flex; gap:8px; margin-top:12px;}
  .irow input[type=text]{flex:1; min-width:0; border:1.5px solid var(--line); border-radius:999px; padding:11px 16px; font:inherit; font-size:16px; outline:0;}
  .irow input[type=text]:focus{border-color:var(--pink);}
  .add{border:0; background:var(--pink-deep); color:#fff; font:inherit; font-weight:700; padding:11px 18px; border-radius:999px; cursor:pointer; flex:none;}

  /* modal */
  .ov{position:fixed; inset:0; background:rgba(80,60,72,.42); display:none; align-items:center; justify-content:center; padding:18px; z-index:50;}
  .ov.open{display:flex;}
  .modal{background:#fff; border-radius:20px; padding:20px; width:100%; max-width:380px; max-height:86vh; overflow:auto;}
  .modal h3{margin:0 0 4px; font-size:18px;}
  .modal .msub{font-size:12.5px; color:var(--muted); margin-bottom:14px;}
  .modal label{display:block; font-size:12.5px; color:#9a8591; font-weight:600; margin:12px 0 6px;}
  .modal input[type=text],.modal input[type=date]{width:100%; border:1.5px solid var(--line); border-radius:11px; padding:11px 13px; font:inherit; font-size:16px; outline:0;}
  .modal input:focus{border-color:var(--pink);}
  .daylist{margin:6px 0 2px;}
  .dayev{display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid #f6ecf2; font-size:14px;}
  .dayev .dot{width:9px; height:9px; border-radius:50%; flex:none;}
  .dayev .dt{flex:1;} .dayev .dx{border:0; background:none; color:#d6bcc8; cursor:pointer; font-size:14px;}
  .catgrid{display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:4px;}
  .subbtn.full{width:100%; margin-top:8px;}
  .catbtn{border:1.5px solid var(--line); background:#fff; border-radius:14px; padding:14px 6px; font:inherit; font-size:13.5px; font-weight:700; color:#7a6670; cursor:pointer; display:flex; flex-direction:column; gap:5px; align-items:center;}
  .catbtn .ce{font-size:23px;}
  .catbtn:active{background:#fbeef4; border-color:var(--pink);}
  .submeet{margin-top:9px;}
  .submeet .placein{width:100%; border:1.5px solid var(--pink); border-radius:12px; padding:12px 14px; font:inherit; font-size:16px; outline:0; margin-bottom:8px;}
  .submeet .placein::placeholder{color:#d3b6c2;}
  .submeet-row{display:grid; grid-template-columns:repeat(2,1fr); gap:8px;}
  .subbtn{border:1.5px solid var(--pink); background:#fff; border-radius:12px; padding:13px; font:inherit; font-weight:700; font-size:14px; color:var(--pink-deep); cursor:pointer;}
  .subbtn:active{background:#fceef4;}
  .mbtns{display:flex; gap:8px; margin-top:18px;}
  .btn{flex:1; border:0; background:var(--pink-deep); color:#fff; font:inherit; font-weight:700; padding:12px; border-radius:12px; cursor:pointer;}
  .btn.ghost{background:#f3e8ee; color:#9a7888;}

  .warn{background:#fff3cd; color:#856404; border-radius:12px; padding:11px 13px; font-size:12.5px; margin-bottom:14px; display:none;}
  .empty{color:#cdb3bf; font-size:13px; padding:6px 2px;}

  /* date review */
  .revview{font-size:12.5px; color:#9a7888; margin-top:2px;}
  .revbox{margin:2px 0 8px; padding:11px; background:#fbf4f8; border-radius:12px;}
  .stars{display:flex; gap:4px; font-size:24px; cursor:pointer; user-select:none;}
  .stars span{color:#e7cdd9;}
  .stars span.on{color:#ffb13d;}
  .revbox input{width:100%; border:1.5px solid var(--line); border-radius:10px; padding:10px 12px; font:inherit; font-size:15px; outline:0; margin-top:8px;}
  .revbox input:focus{border-color:var(--pink);}

  /* makeup */
  .mkmsg-in{width:100%; border:1.5px solid var(--line); border-radius:999px; padding:10px 15px; font:inherit; font-size:15px; outline:0; margin:6px 0 2px;}
  .mkmsg-in:focus{border-color:var(--pink);}
  .mkbtns{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px;}
  .mkbtn{border:1.5px solid var(--line); background:#fff; border-radius:14px; padding:11px 6px; font:inherit; font-weight:700; font-size:13px; color:#8a6670; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px;}
  .mkbtn .be{font-size:21px; line-height:1;}
  .mkbtn:active{background:#fceef4; border-color:var(--pink);}
  .mklog{margin-top:12px;}
  .mkitem{display:flex; align-items:center; gap:8px; padding:9px 4px; border-bottom:1px solid #f6ecf2; font-size:13.5px;}
  .mkitem:last-child{border-bottom:0;}
  .mkitem.fresh{background:#fff6fa; border-radius:10px;}
  .mkitem .mke{font-size:18px; flex:none;}
  .mkitem .mkt{margin-left:auto; font-size:11px; color:#c2adb6; white-space:nowrap;}
  .mkitem .mkx{border:0; background:none; color:#d6bcc8; cursor:pointer; font-size:14px; flex:none; padding:0 0 0 2px;}

  /* pinned anniv */
  .anniv.pinned{background:linear-gradient(135deg,#fff0f6,#fde9f1); border-radius:13px; padding:11px 13px; border-bottom:0; margin-bottom:6px;}
  .anniv.pinned .al{color:var(--pink-deep); font-weight:800;}
  .anniv.pinned .ad{color:var(--pink-deep);}

  /* fold */
  .sec-title.fold-head{cursor:pointer; margin-bottom:0;}
  #tripBody{margin-top:15px;}
  #photoList{margin-top:14px;}
  .fold{margin-left:auto; color:var(--muted); font-size:13px;}

  /* trip */
  .trip-right{margin-left:auto; display:flex; align-items:center; gap:9px;}
  .trip-dday{background:linear-gradient(90deg,var(--pink-deep),var(--blue-deep)); color:#fff; font-size:12px; font-weight:800; padding:4px 11px; border-radius:999px;}
  .trip-meta{margin-bottom:12px;}
  .trip-meta .tm-range{font-size:13.5px; font-weight:700; color:#86596b; margin-bottom:6px;}
  .trip-meta .tm-info{font-size:12.5px; color:#8a7480; line-height:1.6; background:#fbf4f8; border-radius:12px; padding:10px 12px;}
  .trip-day{background:#fff; border:1.5px solid var(--line); border-radius:14px; padding:12px 13px; margin-bottom:9px;}
  .trip-day .td-top{display:flex; align-items:center; gap:6px;}
  .trip-day .td-h{font-weight:800; font-size:14px; color:var(--pink-deep); flex:1;}
  .trip-day .td-x{border:0; background:none; cursor:pointer; font-size:13px; color:#c8b0bc; padding:0 2px;}
  .trip-day .td-body{font-size:13px; color:#6a5a62; line-height:1.65; margin-top:6px;}
  .trip-edit-in{width:100%; border:1.5px solid var(--pink); border-radius:10px; padding:9px 11px; font:inherit; font-size:15px; outline:0; margin-bottom:7px;}
  .trip-edit-ta{width:100%; border:1.5px solid var(--pink); border-radius:10px; padding:9px 11px; font:inherit; font-size:14px; outline:0; resize:vertical; line-height:1.55;}
  .trip-edit-btns{display:flex; gap:7px; margin-top:8px;}
  .trip-edit-btns .subbtn{flex:1;}
  .subbtn.ghost2{border-color:var(--line); color:#9a7888;}
  .trip-foods-title{font-weight:800; font-size:14px; color:var(--pink-deep); margin:18px 0 8px;}
  .prep-irow{margin-top:8px;}
  .tx-edit{cursor:pointer;}
  .prep-irow input{font-size:14px; padding:9px 13px;}
  .prep-legend{display:flex; gap:10px; align-items:center; font-size:11.5px; color:var(--muted); margin:6px 0 4px;}
  .prep-legend .lg{display:inline-flex; align-items:center; gap:4px; font-weight:700;}
  .prep-legend .sw{width:12px; height:12px; border-radius:4px;}
  .prep-legend .lgt{margin-left:auto;}
  .prep-item{display:flex; align-items:center; gap:7px; padding:9px 2px; border-bottom:1px solid #f6ecf2;}
  .prep-item:last-child{border-bottom:0;}
  .pchk{width:25px; height:25px; border-radius:7px; border:2px solid; background:#fff; cursor:pointer; flex:none; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; padding:0;}
  .pchk.a{border-color:var(--pink);} .pchk.a.on{background:var(--pink);}
  .pchk.b{border-color:var(--blue);} .pchk.b.on{background:var(--blue);}
  .prep-item .tx{flex:1; font-size:14.5px; min-width:0;}
  .prep-item .tx.both{text-decoration:line-through; color:#c5b3bd;}
  .food-by{font-size:10.5px; color:#b6a3ae; font-weight:600; flex:none;}
  .food-add{margin-top:8px;}
  .prep-item .del{border:0; background:none; color:#d6bcc8; cursor:pointer; font-size:15px; flex:none;}
  .cmt-wrap{margin-top:9px; border-top:1px dashed #f0dde7; padding-top:8px;}
  .cmt{font-size:12.5px; color:#6a5a62; padding:4px 0; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .cmt-who{font-weight:800; flex:none;}
  .cmt-tx{flex:1; min-width:60px;}
  .cmt-t{font-size:10.5px; color:#c2adb6; flex:none;}
  .cmt-x{border:0; background:none; color:#d6bcc8; cursor:pointer; font-size:12px; flex:none;}
  .cmt-input{display:flex; gap:6px; align-items:center; margin-top:6px; flex-wrap:wrap;}
  .cmt-who-sel{display:flex; gap:4px;}
  .cmt-who-sel button{border:1.5px solid var(--line); background:#fff; border-radius:999px; padding:5px 10px; font:inherit; font-size:12px; cursor:pointer; color:#8a6670;}
  .cmt-who-sel button.on{border-color:transparent; color:#fff; font-weight:700;}
  .cmt-input input{flex:1; min-width:90px; border:1.5px solid var(--line); border-radius:999px; padding:8px 13px; font:inherit; font-size:14px; outline:0;}
  .cmt-add{border:0; background:var(--pink-deep); color:#fff; font:inherit; font-weight:700; padding:8px 14px; border-radius:999px; cursor:pointer; flex:none;}
  .tripbtn{margin-left:0;}
  .cell.trip{background:#eef7ff;}
  .trip-dot{font-size:9px; line-height:1.1;}

  /* scroll reveal — Apple style · 양방향 + 요소 stagger */
  html{scroll-behavior:smooth;}
  .ritem{opacity:0; transform:translateY(44px) scale(.94); filter:blur(9px); will-change:opacity,transform,filter;
    transition:opacity .7s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1), filter .7s ease;}
  .reveal.in .ritem{opacity:1; transform:none; filter:none;}
  @media (prefers-reduced-motion: reduce){ .ritem{opacity:1 !important; transform:none !important; filter:none !important; transition:none;} }

  /* date photos */
  .phday{margin-bottom:15px;}
  .phday:last-child{margin-bottom:0;}
  .phday .phd{font-size:13.5px; font-weight:800; color:var(--pink-deep); margin-bottom:8px;}
  .phrow{display:flex; gap:8px; overflow-x:auto; padding-bottom:3px; -webkit-overflow-scrolling:touch;}
  .phrow .ph{position:relative; flex:none; width:86px; height:86px; border-radius:13px; overflow:hidden; cursor:pointer; background:#fbf4f8;}
  .phrow .ph img{width:100%; height:100%; object-fit:cover; display:block;}
  .phadd{flex:none; width:86px; height:86px; border-radius:13px; border:1.5px dashed var(--pink); background:#fff; color:var(--pink-deep); font:inherit; font-size:12px; font-weight:700; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;}
  .phadd .pe{font-size:21px; line-height:1;}
  .phadd:active{background:#fceef4;}
  /* lightbox */
  .lb{position:fixed; inset:0; background:rgba(40,28,34,.9); display:none; align-items:center; justify-content:center; flex-direction:column; gap:16px; padding:20px; z-index:60;}
  .lb.open{display:flex;}
  .lb img{max-width:100%; max-height:70vh; border-radius:14px; box-shadow:0 8px 30px rgba(0,0,0,.4);}
  .lbbtns{display:flex; gap:10px;}
  .lbbtn{border:0; font:inherit; font-weight:700; padding:12px 24px; border-radius:999px; cursor:pointer;}
  .lbbtn.save{background:#fff; color:var(--pink-deep);}
  .lbbtn.del{background:rgba(255,255,255,.18); color:#fff;}

  .exp-rate{display:flex; align-items:center; gap:6px; font-size:13px; color:#8a7480; margin-bottom:6px; flex-wrap:wrap;}
  .exp-rate input{width:62px; border:1.5px solid var(--line); border-radius:8px; padding:5px 8px; font:inherit; font-size:15px; text-align:right; outline:0;}
  .exp-row{display:flex; align-items:center; gap:7px; padding:8px 2px; border-bottom:1px solid var(--line); font-size:13.5px;}
  .exp-row .ec{font-size:15px; flex:none;}
  .exp-row .en{flex:1; color:#5a4a52; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .exp-row .ewho{font-size:10px; font-weight:800; color:#fff; border-radius:999px; padding:1px 7px; flex:none;}
  .exp-row .ea{font-weight:800; color:#6a5a62; flex:none; font-size:13px;}
  .exp-row .ex{border:0; background:none; cursor:pointer; color:#c8b0bc; font-size:12px; flex:none; padding:0 2px;}
  .exp-empty{color:#c8b0bc; font-size:13px; padding:8px 0;}
  .exp-add{display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:11px;}
  .exp-add select,.exp-add input{border:1.5px solid var(--line); border-radius:9px; padding:9px 10px; font:inherit; font-size:15px; outline:0; background:#fff; width:100%;}
  .exp-add .full{grid-column:1/-1;}
  .exp-sum{margin-top:13px; background:linear-gradient(90deg,#fdeef4,#eef4ff); border-radius:14px; padding:13px 15px;}
  .exp-sum .total{font-size:19px; font-weight:800; color:var(--pink-deep);}
  .exp-sum .ssub{font-size:12.5px; color:#8a7480; margin-top:3px;}
  .exp-cats{font-size:11.5px; color:#9a8490; margin-top:9px; line-height:1.9;}
  .exp-budget{margin-top:10px; font-size:12.5px; color:#8a7480; display:flex; align-items:center; gap:7px; flex-wrap:wrap;}
  .exp-budget input{width:120px; border:1.5px solid var(--line); border-radius:8px; padding:6px 9px; font:inherit; font-size:14px; text-align:right; outline:0;}

  .exp-who{margin-top:11px; display:flex; gap:9px; flex-wrap:wrap; font-size:13px; font-weight:800;}

function midnight(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
function ymd(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function parseD(s){ const p=(s||"").split("-"); return new Date(+p[0],(+p[1]||1)-1,+p[2]||1); }

const DAY=86400000;

/* ---- D-day hero + milestones ---- */
function renderDday(){
  const anv=midnight(parseD(SET.anniv)), today=midnight(new Date());
  const diff=Math.round((today-anv)/DAY);
  const dday=diff+1; /* 사귄 날이 1일 (당일 포함) */
  document.getElementById("heroBig").textContent = diff>=0 ? ("D+"+dday) : ("D"+diff);
  document.getElementById("heroLbl").textContent = SET.a+" ♥ "+SET.b+" 함께한 지";
  document.getElementById("heroSub").textContent = "시작일 "+SET.anniv;

  /* milestones: 일수 기준 + 주년 기준, 다가오는 것 위주 */
  const marks=[];
  [100,200,300,500,1000,2000,3000].forEach(n=>{ const dt=new Date(anv.getTime()+(n-1)*DAY); marks.push({label:n+"일", date:dt}); });
  for(let y=1;y<=20;y++){ const dt=new Date(anv.getFullYear()+y,anv.getMonth(),anv.getDate()); marks.push({label:y+"주년", date:dt}); }
  const up=marks.map(m=>({...m, left:Math.round((midnight(m.date)-today)/DAY)}))
               .filter(m=>m.left>=0).sort((a,b)=>a.left-b.left).slice(0,6);
  const box=document.getElementById("marks"); box.innerHTML="";
  up.forEach(m=>{ const el=document.createElement("div"); el.className="mark";
    el.innerHTML='<div class="mt">'+m.label+'</div><div class="md">'+(m.left===0?"오늘🎉":"D-"+m.left)+'</div><div class="ms">'+ymd(m.date).slice(5).replace("-",".")+'</div>';
    box.appendChild(el); });
}

/* ---- 기념일·생일 ---- */
function annivNext(a){
  const base=parseD(a.date), today=midnight(new Date());
  let next = a.yearly ? new Date(today.getFullYear(), base.getMonth(), base.getDate()) : base;
  if(a.yearly && midnight(next)<today) next=new Date(today.getFullYear()+1, base.getMonth(), base.getDate());
  return {next:midnight(next), left:Math.round((midnight(next)-today)/DAY)};
}

  const arr=ANNIVS.map(a=>Object.assign({},a,annivNext(a))).filter(a=>a.yearly||a.left>=0).sort((x,y)=>x.left-y.left);
  arr.forEach(a=>{ const r=document.createElement("div"); r.className="anniv";

    r.innerHTML='<span class="al">'+esc(a.label)+' <small>'+ymd(a.next).slice(5).replace("-",".")+(a.yearly?" · 매년":"")+'</small></span><span class="ad">'+dd+'</span>';

    x.onclick=()=>{ if(db&&a.id) db.ref(ROOT+"/anniversaries/"+a.id).remove(); };

  });
}

function compressImage(file, cb){
  const reader=new FileReader();
  reader.onload=e=>{ const img=new Image();
    img.onload=()=>{ const max=1000; let w=img.width, h=img.height;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; } else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      cb(cv.toDataURL("image/jpeg",0.72));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

  document.querySelector(".top h1").innerHTML='<span class="y">'+esc(SET.b)+'</span> 💗 <span class="h">'+esc(SET.a)+'</span>';

/* ---- start / sync ---- */
function start(){
  refreshAll();
  const live=document.getElementById("liveTag");
  if(!configured){ document.getElementById("warn").style.display="block";
    document.getElementById("warn").innerHTML="⚠ <b>Firebase 설정 전</b> — 지금은 미리보기예요."; TRIP=JSON.parse(JSON.stringify(TRIP_SEED)); renderTrip(); return; }
  firebase.initializeApp(firebaseConfig); db=firebase.database();
  live.className="live on"; live.textContent="● 실시간 연결됨 — 둘이 함께 보고 있어요";
  db.ref(ROOT+"/settings").on("value",s=>{ const v=s.val(); if(v){ SET=Object.assign(SET,v); } else { db.ref(ROOT+"/settings").set(SET); } refreshAll(); });
  db.ref(ROOT+"/events").on("value",s=>{ const v=s.val()||{}; EVENTS=Object.keys(v).map(k=>Object.assign({id:k},v[k])); renderCal(); renderPhotos(); if(curDay&&document.getElementById("dayOv").classList.contains("open")) renderDayList(); });
  db.ref(ROOT+"/photos").on("value",s=>{ const v=s.val()||{}; PHOTOS=Object.keys(v).map(k=>Object.assign({id:k},v[k])); renderPhotos(); });
  db.ref(ROOT+"/makeups").on("value",s=>{ const v=s.val()||{}; MAKEUPS=Object.keys(v).map(k=>Object.assign({id:k},v[k])); renderMakeups(); });
  db.ref(ROOT+"/todos").on("value",s=>{ const v=s.val()||{}; TODOS=Object.keys(v).map(k=>Object.assign({id:k},v[k])); renderTodos(); });
  db.ref(ROOT+"/memos").on("value",s=>{ const v=s.val()||{}; MEMOS=Object.keys(v).map(k=>Object.assign({id:k},v[k])); renderMemos(); });
  db.ref(ROOT+"/anniversaries").on("value",s=>{ const v=s.val()||{}; ANNIVS=Object.keys(v).map(k=>Object.assign({id:k},v[k])); renderAnnivs(); });
  db.ref(ROOT+"/wishes").on("value",s=>{ const v=s.val()||{}; WISHES=Object.keys(v).map(k=>Object.assign({id:k},v[k])); renderWishes(); });
  db.ref(ROOT+"/trip").on("value",s=>{ const v=s.val();
    if(!v){ db.ref(ROOT+"/trip").set(TRIP_SEED); return; }
    if(!v.seeded2){ db.ref(ROOT+"/trip").update({prep:v.prep||TRIP_SEED.prep, issues:v.issues||TRIP_SEED.issues, seeded2:true}); return; }
    if(!v.seeded3){ const np={}; const pr=v.prep||{};
      Object.keys(pr).forEach(k=>{ const p=pr[k]; let items=p.items;
        if(!items){ items={}; String(p.body||"").split("\n").map(x=>x.trim()).filter(Boolean).forEach((line,i)=>{ items["m"+i]={text:line, done:false, t:i+1}; }); }
        np[k]={order:p.order||0, label:p.label||"", items:items}; });
      db.ref(ROOT+"/trip").update({prep:np, seeded3:true}); return; }
    if(!v.heart){ db.ref(ROOT+"/trip").update({title:"보홀 4박 6일 여행 💗", heart:true}); return; }
    TRIP=v; renderTrip(); renderCal(); });
  setInterval(renderDday, 60000);
}
start();

/* ---- 스크롤 등장 애니메이션 (Apple 스타일 · 양방향 + 요소 stagger) ---- */
(function(){
  const conts=[...document.querySelectorAll(".hero,.marks,.card")];
  const reduce=window.matchMedia&&matchMedia("(prefers-reduced-motion: reduce)").matches;
  if(!("IntersectionObserver" in window)||reduce){ conts.forEach(c=>c.classList.add("in")); return; }
  conts.forEach(cont=>{
    cont.classList.add("reveal");
    [...cont.children].forEach((ch,i)=>{ ch.classList.add("ritem"); ch.style.transitionDelay=(i*0.07)+"s"; }); /* 항목마다 조금씩 늦게 → cascade */
  });
  /* 화면에 들어오면 재생, 나가면 리셋 → 아래로/위로(역주행) 모두 다시 등장 */
  const io=new IntersectionObserver((ents)=>{ ents.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add("in"); else e.target.classList.remove("in");
  }); }, {threshold:0.12, rootMargin:"0px 0px -8% 0px"});
  conts.forEach(c=>io.observe(c));
})();
</script>
